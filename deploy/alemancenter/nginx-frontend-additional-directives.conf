# alemancenter.com — Plesk Additional Nginx Directives
# Frontend: Next.js app handled by Plesk/Node.js
# Backend: Go Fiber internal port 127.0.0.1:8082

proxy_buffer_size 128k;
proxy_buffers 8 256k;
proxy_busy_buffers_size 256k;
large_client_header_buffers 8 32k;

# Compatibility guard for old cached bundles that used /api/dashboard/notifications/*.
# Real dashboard notifications must use /backend-api and authenticated /dashboard pages.
location ^~ /api/dashboard/notifications/ {
    access_log off;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    add_header X-Robots-Tag "noindex, nofollow" always;
    return 204;
}

location ^~ /backend-api/ai/ {
    proxy_pass http://127.0.0.1:8082/api/ai/;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host api.alemancenter.com;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header Origin "https://alemancenter.com";
    proxy_set_header Referer "https://alemancenter.com/";
    proxy_set_header Accept "application/json";
    proxy_set_header X-Requested-With "XMLHttpRequest";
    proxy_set_header Accept-Encoding "";

    proxy_buffer_size 128k;
    proxy_buffers 8 256k;
    proxy_busy_buffers_size 256k;

    gzip off;
    brotli off;
    proxy_connect_timeout 10s;
    proxy_send_timeout 120s;
    proxy_read_timeout 300s;
}

location ^~ /backend-api/ {
    proxy_pass http://127.0.0.1:8082/api/;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host api.alemancenter.com;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header Origin "https://alemancenter.com";
    proxy_set_header Referer "https://alemancenter.com/";
    proxy_set_header Accept "application/json";
    proxy_set_header X-Requested-With "XMLHttpRequest";
    proxy_set_header Accept-Encoding "";

    proxy_buffer_size 128k;
    proxy_buffers 8 256k;
    proxy_busy_buffers_size 256k;

    gzip off;
    brotli off;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 300s;
}

location ^~ /_next/static/ {
    # Next.js immutable static assets (hashed filenames — safe to cache forever)
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Force immutable cache — browsers never re-request these (hash changes on deploy)
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Never cache at Nginx level — always pass through to Next.js
    proxy_no_cache 1;
    proxy_cache_bypass 1;

    access_log off;
}

location ^~ /fonts/ {
    root /var/www/vhosts/alemancenter.com/httpdocs/public;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    add_header X-Content-Type-Options "nosniff" always;
    access_log off;
    log_not_found off;
    try_files $uri =404;
}
